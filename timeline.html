<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timeline</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Playfair+Display:ital@0;1&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f2ed; --line: #1a1a1a; --tick: #1a1a1a; --label: #1a1a1a;
      --event-dot: #1a1a1a; --event-title: #1a1a1a; --event-sub: #7a7570; --accent: #c0392b;
    }
    html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); }
    #timeline-track {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      overflow-x: scroll; overflow-y: hidden; cursor: grab; user-select: none;
      -webkit-overflow-scrolling: touch; scroll-behavior: smooth;
    }
    #timeline-track:active { cursor: grabbing; }
    #timeline-track::-webkit-scrollbar { display: none; }
    #timeline-track { scrollbar-width: none; }
    #timeline-inner { position: relative; height: 100vh; }
    #spine { position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: var(--line); }
    .tick { position: absolute; top: 50%; transform: translateX(-50%) translateY(-50%); display: flex; flex-direction: column; align-items: center; }
    .tick-mark { width: 1px; height: 12px; background: var(--tick); }
    .event { position: absolute; top: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; }
    .event.above { flex-direction: column-reverse; transform: translateX(-50%) translateY(-100%); }
    .event-connector { width: 1px; height: 40px; background: var(--event-dot); opacity: 0.25; }
    .event-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--event-dot); flex-shrink: 0; }
    .event-dot.accent { background: var(--accent); width: 8px; height: 8px; }
    .event-card { max-width: 160px; }
    .event.above .event-card { text-align: right; padding-bottom: 12px; }
    .event.below .event-card { text-align: left; padding-top: 12px; }
    .event-date { font-family: 'DM Mono', monospace; font-weight: 300; font-size: 9px; letter-spacing: 0.14em; color: var(--event-sub); text-transform: uppercase; margin-bottom: 4px; }
    .event-title { font-family: 'Playfair Display', serif; font-size: 13px; font-weight: 400; color: var(--event-title); line-height: 1.3; }
    .event-title.italic { font-style: italic; }
    #gesture-indicator { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.2em; color: var(--accent); opacity: 0; pointer-events: none; transition: opacity 0.1s ease; text-transform: uppercase; }
    #gesture-indicator.visible { opacity: 0.6; }
    #ws-status { position: fixed; bottom: 20px; right: 20px; width: 7px; height: 7px; border-radius: 50%; background: #ccc; transition: background 0.4s; }
    #ws-status.connected { background: #27ae60; }
    #ws-status.disconnected { background: #e74c3c; }
    #hint { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.2em; color: var(--label); opacity: 0.3; pointer-events: none; transition: opacity 0.6s ease; }
    #hint.hidden { opacity: 0; }
    #cursor-line { position: fixed; top: 0; left: 50%; width: 1px; height: 100vh; background: var(--accent); opacity: 0.08; pointer-events: none; }
  </style>
</head>
<body>
<div id="timeline-track"><div id="timeline-inner"><div id="spine"></div></div></div>
<div id="cursor-line"></div>
<div id="hint">scroll or point to travel</div>
<div id="gesture-indicator"></div>
<div id="ws-status" title="Hand tracker connection"></div>
<script>
  const events = [
    { date: "4.5 bya",  title: "Earth forms",               above: true,  accent: true  },
    { date: "3.8 bya",  title: "First life",                above: false, accent: false },
    { date: "541 mya",  title: "Cambrian Explosion",         above: true,  accent: false },
    { date: "252 mya",  title: "The Great Dying",            above: false, accent: true  },
    { date: "66 mya",   title: "K-Pg Extinction",            above: true,  accent: false },
    { date: "2.5 mya",  title: "Homo habilis",               above: false, accent: false },
    { date: "300 kya",  title: "Homo sapiens",               above: true,  accent: false },
    { date: "3500 bce", title: "Writing invented",           above: false, accent: false },
    { date: "776 bce",  title: "First Olympics",             above: true,  accent: false },
    { date: "44 bce",   title: "Caesar assassinated",        above: false, accent: true  },
    { date: "105 ce",   title: "Paper invented",             above: true,  accent: false },
    { date: "1440",     title: "Gutenberg press",            above: false, accent: false },
    { date: "1687",     title: "Newton's Principia",         above: true,  accent: false },
    { date: "1776",     title: "Declaration of Independence",above: false, accent: true  },
    { date: "1859",     title: "On the Origin of Species",   above: true,  accent: false },
    { date: "1903",     title: "First powered flight",       above: false, accent: false },
    { date: "1945",     title: "Atomic age begins",          above: true,  accent: true  },
    { date: "1969",     title: "Moon landing",               above: false, accent: false },
    { date: "1991",     title: "World Wide Web",             above: true,  accent: false },
    { date: "2023",     title: "The AI moment",              above: false, accent: true  },
  ];
  const PADDING=200, EVENT_GAP=220, TICK_INTERVAL=440, SCROLL_AMOUNT=300;
  const inner=document.getElementById('timeline-inner');
  const track=document.getElementById('timeline-track');
  const hint=document.getElementById('hint');
  const totalWidth = PADDING*2 + (events.length-1)*EVENT_GAP;
  inner.style.width = totalWidth+'px';
  events.forEach((ev,i) => {
    const x=PADDING+i*EVENT_GAP, el=document.createElement('div');
    el.className=`event ${ev.above?'above':'below'}`;
    el.style.left=x+'px'; el.style.top='50%';
    el.innerHTML=`<div class="event-card"><div class="event-date">${ev.date}</div><div class="event-title${ev.accent?' italic':''}">${ev.title}</div></div><div class="event-connector"></div><div class="event-dot${ev.accent?' accent':''}"></div>`;
    inner.appendChild(el);
  });
  for(let x=PADDING;x<totalWidth-PADDING;x+=TICK_INTERVAL){
    const t=document.createElement('div'); t.className='tick'; t.style.left=x+'px'; t.style.top='50%';
    t.innerHTML='<div class="tick-mark"></div>'; inner.appendChild(t);
  }
  track.scrollLeft = PADDING - window.innerWidth/2;
  let isDragging=false,startX=0,startScroll=0;
  track.addEventListener('mousedown',e=>{isDragging=true;startX=e.clientX;startScroll=track.scrollLeft;});
  window.addEventListener('mousemove',e=>{if(!isDragging)return;track.scrollLeft=startScroll-(e.clientX-startX);});
  window.addEventListener('mouseup',()=>{isDragging=false;});
  track.addEventListener('scroll',()=>hint.classList.add('hidden'),{once:true});
  const indicator=document.getElementById('gesture-indicator');
  let hideTimer=null;
  function showGesture(label){indicator.textContent=label;indicator.classList.add('visible');clearTimeout(hideTimer);hideTimer=setTimeout(()=>indicator.classList.remove('visible'),500);}
  const statusDot=document.getElementById('ws-status');
  function connectWebSocket(){
    const ws=new WebSocket('ws://localhost:8765');
    ws.onopen=()=>{statusDot.className='connected';console.log('[WS] Connected to hand tracker');};
    ws.onmessage=(event)=>{
      const gesture=event.data.trim();
      if(gesture==='POINTING_LEFT'){track.scrollLeft-=SCROLL_AMOUNT;showGesture('← left');}
      else if(gesture==='POINTING_RIGHT'){track.scrollLeft+=SCROLL_AMOUNT;showGesture('right →');}
    };
    ws.onclose=()=>{statusDot.className='disconnected';console.log('[WS] Disconnected — retrying in 2s...');setTimeout(connectWebSocket,2000);};
    ws.onerror=()=>ws.close();
  }
  connectWebSocket();
</script>
</body>
</html>
